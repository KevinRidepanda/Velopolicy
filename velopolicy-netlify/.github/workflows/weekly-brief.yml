name: Weekly Policy Brief

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger VeloPolicy weekly send
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET "${{ secrets.APP_URL }}/api/weekly-send" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/response.json
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: weekly-send returned HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "✓ Weekly brief sent successfully"
