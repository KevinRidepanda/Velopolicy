[build]
  base    = "velopolicy-netlify"
  publish = "public"
  command = "echo 'No build step needed'"

[functions]
  directory   = "netlify/functions"
  node_bundler = "esbuild"

# Per-function timeouts (seconds) — max 26s on free tier
[functions."claude"]
  timeout = 26

[functions."slack"]
  timeout = 15

[functions."weekly-send"]
  timeout = 26

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200
  force  = true
