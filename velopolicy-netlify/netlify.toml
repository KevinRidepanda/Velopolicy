[build]
  base = "velopolicy-netlify"
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."claude"]
  timeout = 26

[functions."slack"]
  timeout = 10

[functions."weekly-send"]
  timeout = 26

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true
